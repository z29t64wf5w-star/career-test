<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>千帆咨询 · 职业测评系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#F0FDFA;min-height:100vh}
.nav{background:linear-gradient(135deg,#0F766E,#14B8A6);color:white;padding:20px 32px;text-align:center}
.nav h1{font-size:1.5rem;font-weight:700}
.nav p{font-size:0.9rem;opacity:0.9;margin-top:8px}
.container{max-width:800px;margin:0 auto;padding:24px 20px}
.menu{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px}
@media(max-width:600px){.menu{grid-template-columns:1fr}}
.card{background:white;border-radius:16px;padding:28px;box-shadow:0 4px 16px rgba(0,0,0,0.06);text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.1)}
.card .icon{font-size:2.5rem;margin-bottom:12px}
.card h3{font-size:1.2rem;color:#1E293B;margin-bottom:8px}
.card p{font-size:0.88rem;color:#64748B}
.test-box{background:white;border-radius:16px;padding:32px;box-shadow:0 4px 16px rgba(0,0,0,0.06);display:none}
.test-box.active{display:block}
.test-header{text-align:center;margin-bottom:24px}
.test-header h2{color:#0F766E;font-size:1.4rem;margin-bottom:8px}
.test-header p{color:#64748B;font-size:0.9rem}
.progress{background:#F1F5F9;border-radius:10px;height:8px;margin:20px 0}
.progress-bar{height:100%;background:linear-gradient(90deg,#0F766E,#14B8A6);border-radius:10px;transition:width .3s}
.question{margin:24px 0}
.question .q{font-size:1.1rem;color:#1E293B;margin-bottom:16px;font-weight:600}
.options{display:grid;gap:10px}
.options label{display:flex;align-items:center;padding:14px 16px;background:#F8FAFC;border-radius:10px;cursor:pointer;transition:background .2s}
.options label:hover{background:#F0FDFA}
.options input{margin-right:12px}
.nav-btns{display:flex;justify-content:space-between;margin-top:28px}
.btn{padding:12px 28px;border-radius:10px;border:none;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#0F766E,#14B8A6);color:white}
.btn-secondary{background:white;color:#0F766E;border:2px solid #0F766E}
.result-box{background:white;border-radius:16px;padding:32px;box-shadow:0 4px 16px rgba(0,0,0,0.06);display:none}
.result-box.active{display:block}
.result-box h2{text-align:center;color:#0F766E;margin-bottom:24px}
.result-box .score{font-size:2.5rem;font-weight:800;color:#0F766E;text-align:center;margin:16px 0}
.result-box .desc{text-align:center;color:#64748B;margin-bottom:24px}
.result-table{width:100%;margin:24px 0;border-collapse:collapse}
.result-table th,.result-table td{padding:12px 16px;text-align:left;border-bottom:1px solid #E2E8F0}
.result-table th{background:#F8FAFC;font-weight:700;color:#0F766E}
.tag{padding:4px 12px;border-radius:12px;font-size:0.8rem;font-weight:600;display:inline-block}
.tag-1{background:#CCFBF1;color:#0F766E}.tag-2{background:#EDE9FE;color:#6D28D9}.tag-3{background:#FEE2E2;color:#991B1B}
.submit-btn{background:linear-gradient(135deg,#0F766E,#14B8A6);color:white;border:none;padding:16px 40px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;width:100%;margin-top:24px}
.submit-btn:hover{opacity:0.9}
.back-btn{background:#64748B;color:white;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;margin-top:16px}
</style>
</head>
<body>
<div class="nav">
<h1>⛵ 千帆咨询 · 职业测评系统</h1>
<p>专业测评 · 科学规划 · 成就未来</p>
</div>
<div class="container">

<!-- 菜单 -->
<div id="menu" class="menu">
<div class="card" onclick="startTest('holland')">
<div class="icon">🧭</div>
<h3>霍兰德职业兴趣</h3>
<p>60 题 · 约 10 分钟</p>
</div>
<div class="card" onclick="startTest('mbti')">
<div class="icon">🔮</div>
<h3>MBTI 性格类型</h3>
<p>40 题 · 约 8 分钟</p>
</div>
<div class="card" onclick="startTest('career-anchor')">
<div class="icon">⚓</div>
<h3>职业锚测评</h3>
<p>40 题 · 约 8 分钟</p>
</div>
<div class="card" onclick="startTest('pdp')">
<div class="icon">🐯</div>
<h3>PDP 特质测评</h3>
<p>40 题 · 约 8 分钟</p>
</div>
</div>

<!-- 测评框 -->
<div id="testBox" class="test-box">
<div class="test-header">
<h2 id="testTitle"></h2>
<p id="testDesc"></p>
</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div id="questionBox" class="question"></div>
<div class="nav-btns">
<button class="btn btn-secondary" id="prevBtn" onclick="prevQ()">上一题</button>
<button class="btn btn-primary" id="nextBtn" onclick="nextQ()">下一题</button>
</div>
</div>

<!-- 结果框 -->
<div id="resultBox" class="result-box">
<h2 id="resultTitle"></h2>
<div id="resultContent"></div>
<button class="submit-btn" onclick="submitResult()">📤 提交结果给老师</button>
<button class="back-btn" onclick="goHome()">返回首页</button>
</div>

</div>

function startTest(type){
    currentTest = type;
    currentQ = 0;
    answers = {};
    
    var data;
    if(type==='holland') data = hollandData;
    else if(type==='mbti') data = mbtiData;
    else if(type==='career-anchor') data = careerAnchorData;
    else if(type==='pdp') data = pdpData;
    
    document.getElementById('menu').style.display = 'none';
    document.getElementById('testBox').classList.add('active');
    document.getElementById('testTitle').textContent = data.title;
    document.getElementById('testDesc').textContent = data.desc;
    renderQuestion();
}

function renderQuestion(){
    var data;
    if(currentTest==='holland') data = hollandData;
    else if(currentTest==='mbti') data = mbtiData;
    else if(currentTest==='career-anchor') data = careerAnchorData;
    else if(currentTest==='pdp') data = pdpData;
    
    var q = data.questions[currentQ];
    var pct = ((currentQ+1)/data.questions.length*100).toFixed(0);
    document.getElementById('progressBar').style.width = pct+'%';
    
    var html = '<div class="q">'+q.q+'</div><div class="options">';
    if(currentTest==='holland' || currentTest==='career-anchor' || currentTest==='pdp'){
        html += '<label><input type="radio" name="ans" value="1" '+(answers[currentQ]===1?'checked':'')+'> 非常不符合</label>';
        html += '<label><input type="radio" name="ans" value="2" '+(answers[currentQ]===2?'checked':'')+'> 比较不符合</label>';
        html += '<label><input type="radio" name="ans" value="3" '+(answers[currentQ]===3?'checked':'')+'> 一般</label>';
        html += '<label><input type="radio" name="ans" value="4" '+(answers[currentQ]===4?'checked':'')+'> 比较符合</label>';
        html += '<label><input type="radio" name="ans" value="5" '+(answers[currentQ]===5?'checked':'')+'> 非常符合</label>';
    } else {
        html += '<label><input type="radio" name="ans" value="A" '+(answers[currentQ]==='A'?'checked':'')+'> '+q.a+'</label>';
        html += '<label><input type="radio" name="ans" value="B" '+(answers[currentQ]==='B'?'checked':'')+'> '+q.b+'</label>';
    }
    html += '</div>';
    document.getElementById('questionBox').innerHTML = html;
    
    document.getElementById('prevBtn').disabled = currentQ===0;
    document.getElementById('nextBtn').textContent = currentQ===data.questions.length-1?'完成测评':'下一题';
}

function nextQ(){
    var data;
    if(currentTest==='holland') data = hollandData;
    else if(currentTest==='mbti') data = mbtiData;
    else if(currentTest==='career-anchor') data = careerAnchorData;
    else if(currentTest==='pdp') data = pdpData;
    
    var ans = document.querySelector('input[name="ans"]:checked');
    if(!ans){ alert('请选择一个选项'); return; }
    answers[currentQ] = ans.value;
    
    if(currentQ<data.questions.length-1){
        currentQ++;
        renderQuestion();
    } else {
        showResult();
    }
}

function prevQ(){
    if(currentQ>0){
        currentQ--;
        renderQuestion();
    }
}

function showResult(){
    var data, scores = {}, code = '';
    
    if(currentTest==='holland'){
        scores = {R:0,I:0,A:0,S:0,E:0,C:0};
        hollandData.questions.forEach(function(q,i){
            scores[q.type] += parseInt(answers[i])||0;
        });
        var arr = Object.entries(scores).sort(function(a,b){return b[1]-a[1]});
        code = arr.slice(0,3).map(function(x){return x[0]}).join('');
        
        document.getElementById('resultTitle').textContent = '你的霍兰德职业代码：'+code;
        var html = '<p class="score">'+code+'</p><p class="desc">主要职业倾向</p>';
        html += '<table class="result-table"><tr><th>类型</th><th>得分</th><th>说明</th></tr>';
        arr.forEach(function(x){
            html += '<tr><td><span class="tag tag-1">'+hollandData.labels[x[0]]+'</span></td><td>'+x[1]+'</td><td>'+getHollandDesc(x[0])+'</td></tr>';
        });
        html += '</table>';
        document.getElementById('resultContent').innerHTML = html;
        
    } else if(currentTest==='mbti'){
        var dims = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
        mbtiData.questions.forEach(function(q,i){
            var val = answers[i]==='A'?q.val:q.bval;
            dims[val]++;
        });
        code = (dims.E>=dims.I?'E':'I')+(dims.S>=dims.N?'S':'N')+(dims.T>=dims.F?'T':'F')+(dims.J>=dims.P?'J':'P');
        
        document.getElementById('resultTitle').textContent = '你的 MBTI 类型：'+code;
        var html = '<p class="score">'+code+'</p><p class="desc">性格类型代码</p>';
        html += '<table class="result-table"><tr><th>维度</th><th>倾向</th><th>比例</th></tr>';
        var pairs = [['E','I'],['S','N'],['T','F'],['J','P']];
        var labels = {E:'外向',I:'内向',S:'感觉',N:'直觉',T:'思考',F:'情感',J:'判断',P:'感知'};
        pairs.forEach(function(p){
            var total = dims[p[0]]+dims[p[1]];
            html += '<tr><td>'+mbtiData.labels[p[0]+p[1]]+'</td><td>'+(dims[p[0]]>=dims[p[1]]?labels[p[0]]:labels[p[1]])+'</td><td>'+Math.round(dims[p[0]]/total*100)+'% : '+Math.round(dims[p[1]]/total*100)+'%</td></tr>';
        });
        html += '</table>';
        document.getElementById('resultContent').innerHTML = html;
        
    } else if(currentTest==='career-anchor'){
        var anchors = {'技术职能':0,'管理':0,'自主独立':0,'安全稳定':0,'创业创造':0,'服务奉献':0,'纯粹挑战':0,'生活方式':0};
        careerAnchorData.questions.forEach(function(q,i){
            anchors[q.val] += parseInt(answers[i])||0;
        });
        var arr = Object.entries(anchors).sort(function(a,b){return b[1]-a[1]});
        code = arr[0][0];
        
        document.getElementById('resultTitle').textContent = '你的职业锚：'+careerAnchorData.labels[code];
        var html = '<p class="score">'+careerAnchorData.labels[code].split(' ')[1]+'</p><p class="desc">核心职业价值观</p>';
        html += '<table class="result-table"><tr><th>职业锚</th><th>得分</th><th>说明</th></tr>';
        arr.forEach(function(x){
            html += '<tr><td><span class="tag tag-1">'+careerAnchorData.labels[x[0]]+'</span></td><td>'+x[1]+'</td><td>'+getAnchorDesc(x[0])+'</td></tr>';
        });
        html += '</table>';
        document.getElementById('resultContent').innerHTML = html;
        
    } else if(currentTest==='pdp'){
        var pdps = {'老虎':0,'孔雀':0,'考拉':0,'猫头鹰':0,'变色龙':0};
        pdpData.questions.forEach(function(q,i){
            pdps[q.val] += parseInt(answers[i])||0;
        });
        var arr = Object.entries(pdps).sort(function(a,b){return b[1]-a[1]});
        code = arr[0][0];
        
        document.getElementById('resultTitle').textContent = '你的 PDP 特质：'+pdpData.labels[code];
        var html = '<p class="score">'+pdpData.labels[code].split(' ')[1]+'</p><p class="desc">主导行为风格</p>';
        html += '<table class="result-table"><tr><th>特质</th><th>得分</th><th>说明</th></tr>';

            html += '<tr><td><span class="tag tag-1">'+pdpData.labels[x[0]]+'</span></td><td>'+x[1]+'</td><td>'+getPdpDesc(x[0])+'</td></tr>';
        });
        html += '</table>';
        document.getElementById('resultContent').innerHTML = html;
    }

    document.getElementById('resultBox').classList.add('active');

function submitResult(){
    var data, scores = {}, code = '';
    
    if(currentTest==='holland'){
        scores = {R:0,I:0,A:0,S:0,E:0,C:0};
        hollandData.questions.forEach(function(q,i){
            scores[q.type] += parseInt(answers[i])||0;
        });
        var arr = Object.entries(scores).sort(function(a,b){return b[1]-a[1]});
        code = arr.slice(0,3).map(function(x){return x[0]}).join('');
        
    } else if(currentTest==='mbti'){
        var dims = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
        mbtiData.questions.forEach(function(q,i){
            var val = answers[i]==='A'?q.val:q.bval;
            dims[val]++;
        });
        code = (dims.E>=dims.I?'E':'I')+(dims.S>=dims.N?'S':'N')+(dims.T>=dims.F?'T':'F')+(dims.J>=dims.P?'J':'P');
        scores = dims;
        
    } else if(currentTest==='career-anchor'){
        var anchors = {'技术职能':0,'管理':0,'自主独立':0,'安全稳定':0,'创业创造':0,'服务奉献':0,'纯粹挑战':0,'生活方式':0};
        careerAnchorData.questions.forEach(function(q,i){
            anchors[q.val] += parseInt(answers[i])||0;
        });
        var arr = Object.entries(anchors).sort(function(a,b){return b[1]-a[1]});
        code = arr[0][0];
        scores = anchors;
        
    } else if(currentTest==='pdp'){
        var pdps = {'老虎':0,'孔雀':0,'考拉':0,'猫头鹰':0,'变色龙':0};
        pdpData.questions.forEach(function(q,i){
            pdps[q.val] += parseInt(answers[i])||0;
        });
        var arr = Object.entries(pdps).sort(function(a,b){return b[1]-a[1]});
        code = arr[0][0];
        scores = pdps;
    }
    
    var payload = {
        type: currentTest==='holland'?'holland':currentTest==='mbti'?'mbti':currentTest,
        code: code,
        scores: scores,
        timestamp: new Date().toISOString()
    };
    
    fetch(API_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    }).then(function(r){
        if(r.ok){
            alert('✅ 提交成功！老师可以看到你的测评结果。');
        } else {
            alert('❌ 提交失败，请重试或联系老师。');
        }
    }).catch(function(e){
        alert('❌ 网络错误，请检查网络后重试。');
    });
}
